name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  backend:
    name: backend (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build + tests (Testcontainers)
        working-directory: backend
        run: mvn -B verify
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: lunerie-api
          path: backend/target/*.jar
          if-no-files-found: error

  frontend:
    name: frontend (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test --silent

  docker-image:
    name: backend image (build only)
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: lunerie/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

  trivy:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    needs: docker-image
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: lunerie/api:scan
      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'lunerie/api:scan'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'   # report only; flip to '1' once baseline is clean
          format: 'sarif'
          output: 'trivy-image.sarif'
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image.sarif'
