spring:
  application:
    name: lunerie-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lunerie}
    username: ${SPRING_DATASOURCE_USERNAME:lunerie}
    password: ${SPRING_DATASOURCE_PASSWORD:lunerie}
    hikari:
      pool-name: LunerieHikari
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_POOL_LEAK_THRESHOLD_MS:30000}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false
        use_sql_comments: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false

  mvc:
    problemdetails:
      enabled: false
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:true}

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: native
  tomcat:
    remoteip:
      # Only trust X-Forwarded-* from Docker bridge networks + private RFC1918 ranges.
      # The Docker Compose `lunerie-net` is a bridge network and uses 172.x.x.x by default.
      internal-proxies: ${LUNERIE_TRUSTED_PROXIES:127\\.0\\.0\\.1|::1|172\\.(?:1[6-9]|2[0-9]|3[01])\\.\\d+\\.\\d+|10\\.\\d+\\.\\d+\\.\\d+|192\\.168\\.\\d+\\.\\d+}
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain,text/css
  error:
    include-message: always
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus,metrics,env,loggers
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      instance: ${LUNERIE_INSTANCE_ID:local}
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.lunerie: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%X{requestId:-}] [%X{userId:-}] %-40.40logger{39} : %m%n'

# -------------------------------------------------------------------------
# Lunerie-specific configuration
# -------------------------------------------------------------------------
lunerie:
  api:
    version: 1.0.0
  cors:
    allowed-origins: ${LUNERIE_CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allow-credentials: true
    max-age-seconds: 3600
  security:
    jwt:
      secret: ${LUNERIE_JWT_SECRET:please-change-me-to-at-least-32-bytes-of-random-data}
      issuer: ${LUNERIE_JWT_ISSUER:lunerie-api}
      audience: ${LUNERIE_JWT_AUDIENCE:lunerie-app}
      access-token-ttl: ${LUNERIE_JWT_ACCESS_TTL:PT15M}
      refresh-token-ttl: ${LUNERIE_JWT_REFRESH_TTL:P30D}
      max-refresh-tokens-per-user: ${LUNERIE_JWT_MAX_REFRESH_PER_USER:8}
    rate-limit:
      capacity: ${LUNERIE_RATE_CAPACITY:30}
      refill-tokens: ${LUNERIE_RATE_REFILL:30}
      refill-period: ${LUNERIE_RATE_REFILL_PERIOD:PT1M}
    refresh-token-cleanup-cron: ${LUNERIE_REFRESH_CLEANUP_CRON:0 0 * * * *}
    audit-retention:           ${LUNERIE_AUDIT_RETENTION:P180D}
    audit-retention-cron:      ${LUNERIE_AUDIT_CLEANUP_CRON:0 30 3 * * *}
    verification-cleanup-cron: ${LUNERIE_VERIFY_CLEANUP_CRON:0 15 * * * *}
    cookie:
      secure:    ${LUNERIE_COOKIE_SECURE:true}
      same-site: ${LUNERIE_COOKIE_SAME_SITE:Strict}
  observability:
    slow-request-threshold-ms: ${LUNERIE_SLOW_REQ_THRESHOLD_MS:1500}
  admin:
    email:        ${LUNERIE_ADMIN_EMAIL:}
    password:     ${LUNERIE_ADMIN_PASSWORD:}
    display-name: ${LUNERIE_ADMIN_NAME:Lunerie Admin}
  pagination:
    default-page-size: ${LUNERIE_DEFAULT_PAGE_SIZE:24}
    max-page-size:     ${LUNERIE_MAX_PAGE_SIZE:100}
  mail:
    from: ${LUNERIE_MAIL_FROM:no-reply@lunerie.local}
  frontend:
    base-url: ${LUNERIE_FRONTEND_URL:http://localhost:5173}

