<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Theme color responds to user color scheme so the system chrome (status bar, edge UI)
         picks the right tint in either mode. -->
    <meta name="theme-color" content="#07111f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f5ef" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <meta name="description" content="Premium mobile-first travel discovery — hidden places, viewpoints, photogenic escapes." />
    <meta name="application-name" content="Lunerie" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lunerie" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph / social card -->
    <meta property="og:title" content="Lunerie · Hidden Places" />
    <meta property="og:description" content="Premium mobile-first travel discovery — hidden places, viewpoints, photogenic escapes." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-maskable.svg" />
    <meta name="twitter:card" content="summary" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="mask-icon" href="/icon-monochrome.svg" color="#f97316" />

    <title>Lunerie · Hidden Places</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="min-height:100dvh;display:grid;place-items:center;padding:24px;background:#06101d;color:#f8fafc;font-family:system-ui,-apple-system,sans-serif;">
        <div style="max-width:420px;text-align:center;padding:28px;border-radius:24px;background:rgba(15,23,42,0.85);border:1px solid rgba(255,255,255,0.08);">
          <h1 style="font-size:24px;margin-bottom:12px;">Lunerie needs JavaScript</h1>
          <p style="line-height:1.6;color:rgba(203,213,225,0.86);">Enable JavaScript in your browser to load the discovery experience.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
