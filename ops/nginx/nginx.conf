worker_processes auto;
events { worker_connections 2048; }

http {
    include       mime.types;
    default_type  application/json;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # ---------------------------------------------------------------------
    # Distributed rate limiting (the per-replica Bucket4j is defense in depth).
    # 10 r/s per IP, burst 20 — equivalent to ~600 r/min total to /api/auth/*
    # 60 r/s per IP, burst 120 for general traffic
    # ---------------------------------------------------------------------
    limit_req_zone   $binary_remote_addr zone=auth_zone:10m   rate=10r/s;
    limit_req_zone   $binary_remote_addr zone=api_zone:20m    rate=60r/s;
    limit_req_status 429;

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream lunerie_backend {
        zone lunerie_backend 64k;
        server backend:8080 resolve max_fails=3 fail_timeout=10s;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    log_format json_combined escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"referer":"$http_referer",'
            '"ua":"$http_user_agent",'
            '"rt":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_rt":"$upstream_response_time",'
            '"request_id":"$request_id"'
        '}';

    access_log /dev/stdout json_combined;
    error_log  /dev/stderr warn;

    server {
        listen 8080;

        gzip on;
        gzip_types application/json text/plain;
        gzip_min_length 1024;

        proxy_set_header X-Request-Id     $request_id;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host             $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;

        # Health (bypass rate limit)
        location = /api/health {
            proxy_pass http://lunerie_backend;
        }

        # Auth endpoints — strictest limit
        location /api/auth/ {
            limit_req zone=auth_zone burst=20 nodelay;
            limit_req_log_level warn;
            proxy_pass http://lunerie_backend;
        }

        # Everything else
        location / {
            limit_req zone=api_zone burst=120 nodelay;
            proxy_pass http://lunerie_backend;
        }
    }
}
