global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: lunerie
    env: ${ENV:-local}

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'lunerie-backend'
    metrics_path: /actuator/prometheus
    scheme: http
    dns_sd_configs:
      - names: ['backend']
        type: 'A'
        port: 8080
        refresh_interval: 15s

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Tempo emits its own /metrics + the metrics_generator output
  # (traces_spanmetrics_duration_milliseconds, traces_service_graph_*).
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  # OTel collector exposes pipeline / receiver / exporter metrics.
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
