# Grafana Tempo single-binary configuration.
# Receives OTLP traces, stores them on local disk, exposes /api/traces for Grafana.
# All settings reasonable for dev / single-host prod; bump retention for production.

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    # OTLP HTTP (4318) and gRPC (4317) from the OTel collector.
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h  # 7 days

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# Aggregate request latency / error rate metrics out of received spans and
# expose them under tempo's /metrics so Prometheus can scrape them.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/metrics-generator
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
