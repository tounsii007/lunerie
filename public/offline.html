<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <title>Lunerie · Offline</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: dark; font-family: "Plus Jakarta Sans", "Sora", system-ui, sans-serif; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100dvh;
        background:
          radial-gradient(circle at 20% 0%, rgba(56,189,248,0.18), transparent 32%),
          radial-gradient(circle at 80% 10%, rgba(244,114,182,0.16), transparent 28%),
          radial-gradient(circle at 50% 100%, rgba(249,115,22,0.14), transparent 36%),
          #06101d;
        color: #f8fafc;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 460px;
        width: 100%;
        padding: 32px;
        border-radius: 32px;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(28px) saturate(160%);
        -webkit-backdrop-filter: blur(28px) saturate(160%);
        box-shadow: 0 24px 60px rgba(2, 8, 23, 0.42);
        text-align: center;
        display: grid;
        gap: 14px;
      }
      .glyph {
        width: 72px;
        height: 72px;
        margin: 0 auto;
        border-radius: 24px;
        background: linear-gradient(135deg, rgba(249, 115, 22, 0.18), rgba(56, 189, 248, 0.18));
        color: #fdba74;
        display: grid;
        place-items: center;
        box-shadow: 0 12px 32px rgba(249, 115, 22, 0.32);
      }
      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #fdba74;
        font-weight: 700;
      }
      h1 {
        font-family: "Fraunces", serif;
        font-size: 30px;
        line-height: 1.05;
        letter-spacing: -0.02em;
        font-weight: 600;
      }
      p { color: rgba(203, 213, 225, 0.86); line-height: 1.6; font-size: 14px; }
      button {
        margin-top: 8px;
        padding: 14px 18px;
        border-radius: 16px;
        border: 0;
        background: linear-gradient(135deg, #f97316, #fdba74);
        color: #0f172a;
        font-weight: 800;
        font-size: 15px;
        cursor: pointer;
        box-shadow: 0 14px 32px rgba(249, 115, 22, 0.32);
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="card" role="alert">
      <span class="glyph" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19c-2 0-3.5-.5-5-2-1.5-1.5-2-3-2-5"/><path d="M22 12c0 4-3 8-8 8"/><path d="M2 12c0-4 3-8 8-8"/><path d="M2 2l20 20"/></svg>
      </span>
      <span class="eyebrow">Offline mode</span>
      <h1>You are offline</h1>
      <p>Lunerie cannot reach the network right now. Your saved places and recent activity remain available — the rest of the app will resume as soon as connectivity returns.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
